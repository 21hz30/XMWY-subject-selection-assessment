{% extends "base.html" %}
{% block title %}找回密码 - 西南位育选课系统{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <h3 class="text-center mb-4">找回密码</h3>
        <div class="card shadow">
            <div class="card-body p-4">
                <!-- 步骤1: 输入手机号 -->
                <div id="fp-step-phone">
                    <div class="mb-3">
                        <label for="fp-phone" class="form-label">手机号</label>
                        <input type="text" class="form-control" id="fp-phone" placeholder="请输入已注册的手机号" maxlength="11">
                        <div class="invalid-feedback" id="fp-phone-error"></div>
                    </div>
                    <button type="button" class="btn btn-primary w-100" id="fp-btn-check-phone">下一步</button>
                </div>

                <!-- 步骤2: 验证码 -->
                <div id="fp-step-code" style="display:none;">
                    <div class="alert alert-info" id="fp-phone-display"></div>
                    <div class="mb-3">
                        <label for="fp-code" class="form-label">验证码</label>
                        <input type="text" class="form-control" id="fp-code" placeholder="请输入6位验证码" maxlength="6">
                        <div class="invalid-feedback" id="fp-code-error"></div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-outline-secondary" id="fp-btn-resend">重新发送</button>
                        <button type="button" class="btn btn-primary flex-grow-1" id="fp-btn-verify">验证</button>
                    </div>
                </div>

                <!-- 步骤3: 重置密码 -->
                <div id="fp-step-password" style="display:none;">
                    <div class="alert alert-success">验证通过！请设置新密码。</div>
                    <div class="mb-3">
                        <label for="fp-new-pwd" class="form-label">设置新密码</label>
                        <input type="password" class="form-control" id="fp-new-pwd" placeholder="请输入新密码（至少6位）">
                    </div>
                    <div class="mb-3">
                        <label for="fp-new-pwd2" class="form-label">确认新密码</label>
                        <input type="password" class="form-control" id="fp-new-pwd2" placeholder="请再次输入新密码">
                        <div class="invalid-feedback" id="fp-pwd-error"></div>
                    </div>
                    <button type="button" class="btn btn-success w-100" id="fp-btn-submit">重置密码</button>
                </div>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}">返回登录</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let fpPhone = '';
let fpVerified = false;

document.getElementById('fp-btn-check-phone').addEventListener('click', async function() {
    fpPhone = document.getElementById('fp-phone').value.trim();
    if (fpPhone.length !== 11 || !/^\d+$/.test(fpPhone)) {
        document.getElementById('fp-phone-error').textContent = '请输入正确的11位手机号';
        return;
    }
    const resp = await fetch('{{ url_for("check_phone") }}', {
        method: 'POST',
        body: new URLSearchParams({ phone: fpPhone }),
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
    });
    const data = await resp.json();
    if (!data.exists) {
        document.getElementById('fp-phone-error').textContent = '该账号不存在';
        return;
    }
    // 发送验证码
    const codeResp = await fetch('{{ url_for("send_code") }}', {
        method: 'POST',
        body: new URLSearchParams({ phone: fpPhone }),
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
    });
    const codeData = await codeResp.json();
    console.log('验证码:', codeData.code);
    document.getElementById('fp-step-phone').style.display = 'none';
    document.getElementById('fp-step-code').style.display = 'block';
    document.getElementById('fp-phone-display').textContent = '验证码已发送至 ' + fpPhone + '（开发阶段请查看F12控制台）';
});

document.getElementById('fp-btn-verify').addEventListener('click', async function() {
    const code = document.getElementById('fp-code').value.trim();
    const resp = await fetch('{{ url_for("verify_code") }}', {
        method: 'POST',
        body: new URLSearchParams({ code: code }),
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
    });
    const data = await resp.json();
    if (data.status === 'ok') {
        fpVerified = true;
        document.getElementById('fp-step-code').style.display = 'none';
        document.getElementById('fp-step-password').style.display = 'block';
    } else {
        document.getElementById('fp-code-error').textContent = '验证码错误';
    }
});

document.getElementById('fp-btn-submit').addEventListener('click', async function() {
    const pwd = document.getElementById('fp-new-pwd').value;
    const pwd2 = document.getElementById('fp-new-pwd2').value;
    if (pwd.length < 6) {
        document.getElementById('fp-pwd-error').textContent = '密码长度不能少于6位';
        return;
    }
    if (pwd !== pwd2) {
        document.getElementById('fp-pwd-error').textContent = '两次密码输入不一致';
        return;
    }
    if (!fpVerified) return;

    const resp = await fetch('{{ url_for("forgot_password") }}', {
        method: 'POST',
        body: new URLSearchParams({ phone: fpPhone, new_password: pwd }),
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
    });
    if (resp.redirected) {
        window.location.href = resp.url;
    } else {
        window.location.href = '{{ url_for("login") }}';
    }
});
</script>
{% endblock %}
